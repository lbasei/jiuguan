<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&family=Cinzel+Decorative:wght@700&family=ZCOOL+XiaoWei&display=swap');
      html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; -webkit-user-select: none; }
      #stage {
        height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        padding-bottom: 4px; cursor: grab; touch-action: none;
        app-region: no-drag; -webkit-app-region: no-drag; user-select: none;
      }
      #stage.dragging { cursor: grabbing; }
      #stage.choosing-mode { cursor: default; }
      #stage.island-mode {
        flex-direction: row; justify-content: center; gap: 7px; padding: 4px 8px;
        background: transparent;
        border: 0; box-shadow: none;
        cursor: pointer;
      }
      #petControls {
        position: absolute; right: 5px; top: 5px; display: flex; gap: 4px;
        app-region: no-drag; -webkit-app-region: no-drag; z-index: 3;
      }
      .pet-tool {
        width: 24px; height: 24px; padding: 0; border: 2px solid #23445C;
        background: #F8FFFD; color: #23445C;
        box-shadow: 2px 2px 0 #23445C; font-size: 15px; line-height: 1; cursor: pointer;
        font-family: 'DotGothic16', monospace; position: relative;
      }
      .pet-tool:hover { filter: brightness(1.06); }
      .pet-tool::before,
      .pet-tool::after { content: ''; position: absolute; display: block; }
      .tool-wand::before {
        width: 14px; height: 3px; left: 4px; top: 10px;
        background: #F8FFFD; border: 2px solid #23445C; transform: rotate(-38deg);
      }
      .tool-wand::after {
        width: 7px; height: 7px; right: 3px; top: 3px; background: #7E8BE6;
        clip-path: polygon(50% 0, 62% 36%, 100% 50%, 62% 64%, 50% 100%, 38% 64%, 0 50%, 38% 36%);
        filter: drop-shadow(1px 1px 0 #23445C);
      }
      .tool-clock::before {
        content: '00'; left: 3px; top: 7px; width: 18px; height: auto;
        font-family: 'Press Start 2P', monospace; font-size: 6px; color: #23445C;
        border: 0; border-radius: 0; background: transparent; box-shadow: none;
      }
      .tool-clock::after {
        display: none;
      }
      #stage.island-mode #petControls,
      #stage.island-mode #bubble,
      #stage.island-mode #counter,
      #stage.island-mode #cup,
      #stage.island-mode #plate,
      #stage.island-mode .chooser-arrow,
      #stage.island-mode #magicFx {
        display: none;
      }
      #islandTask {
        display: none; max-width: 82px; color: #23445C;
        font-family: 'DotGothic16', monospace; font-size: 11px; font-weight: 700; line-height: 1.08;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        text-shadow:
          -1px 0 0 #F8FFFD,
          1px 0 0 #F8FFFD,
          0 -1px 0 #F8FFFD,
          0 1px 0 #F8FFFD;
        app-region: no-drag; -webkit-app-region: no-drag;
      }
      #stage.island-mode #islandTask.show { display: block; }
      #bubble {
        font-family: 'DotGothic16', monospace; font-size: 12px; color: #23445C;
        position: relative; overflow: hidden;
        background: rgba(248,255,253,.96);
        border: 3px double #23445C; box-shadow: 3px 3px 0 #23445C, 0 0 0 2px rgba(201,255,240,.56);
        padding: 7px 12px; margin-bottom: 5px; max-width: 196px; text-align: center; min-height: 18px;
        opacity: 0; transition: opacity .2s;
        clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
      }
      #bubble.show { opacity: 1; }
      #bubble .act { font-family: 'Press Start 2P'; font-size: 8px; color: #7E8BE6; display: block; margin-top: 4px; }
      #bubble .summon-call {
        display: block; font-family: 'Cinzel Decorative', 'ZCOOL XiaoWei', serif;
        font-size: 14px; font-weight: 700; color: #23445C; text-shadow: 0 1px 0 rgba(255,255,255,.75);
      }
      #bubble .summon-call::before,
      #bubble .summon-call::after {
        content: '✦'; color: #7E8BE6; font-family: 'DotGothic16', monospace; font-size: 11px; margin: 0 5px;
      }
      #bubble .summon-sub {
        display: block; margin-top: 2px; color: #638397; font-size: 10px;
      }
      #counter {
        font-family: 'DotGothic16', monospace; font-size: 11px; color: #23445C;
        background: rgba(248,255,253,.88);
        background-size: 16px 100%, auto;
        border: 0; box-shadow: none;
        padding: 6px 8px; margin-bottom: 5px; width: 142px; max-height: none; overflow: visible;
        text-align: left; opacity: 0; visibility: hidden; transition: opacity .2s;
        clip-path: none;
      }
      #timerChip {
        display: none; align-items: center; justify-content: center;
        min-width: 82px;
        font-family: 'Press Start 2P', monospace; font-size: 11px; color: #23445C;
        border: 0; background: transparent; letter-spacing: 0;
        box-shadow: none; padding: 3px 2px; margin: 0 0 5px;
        app-region: no-drag; -webkit-app-region: no-drag;
        text-shadow:
          -1px 0 0 #F8FFFD,
          1px 0 0 #F8FFFD,
          0 -1px 0 #F8FFFD,
          0 1px 0 #F8FFFD,
          2px 2px 0 rgba(35,68,92,.18);
      }
      #timerChip.show { display: inline-flex; }
      #timerChip .timer-mark {
        display: none;
      }
      #timerChip.over {
        color: #D86F63;
      }
      #stage.island-mode #timerChip {
        display: inline-flex; margin: 0; box-shadow: none; border-width: 0; padding: 0;
        min-width: 68px; max-width: 82px; overflow: visible;
        font-size: 10px;
      }
      #stage.island-mode #timerChip::before {
        content: 'LEFT'; font-family: 'Press Start 2P', monospace; font-size: 5px;
        margin-right: 5px; color: #638397; transform: translateY(-1px);
      }
      #stage.island-mode #timerChip.over::before {
        content: '+TIME'; color: #D86F63;
      }
      #islandComplete {
        display: none; width: 34px; height: 34px; border: 0; padding: 0; margin: 0;
        background: transparent; box-shadow: none; cursor: pointer;
        app-region: no-drag; -webkit-app-region: no-drag;
      }
      #stage.island-mode #islandComplete.show { display: inline-grid; place-items: center; }
      #islandComplete::before {
        content: ''; display: block; width: 20px; height: 12px;
        border-left: 5px solid #D49A00; border-bottom: 5px solid #D49A00;
        transform: rotate(-45deg) translate(1px, -2px);
        filter:
          drop-shadow(-1px 0 0 #FFF7C8)
          drop-shadow(1px 0 0 #FFF7C8)
          drop-shadow(0 1px 0 #FFF7C8);
      }
      #islandComplete:hover::before { transform: rotate(-45deg) translate(1px, -2px) scale(1.08); }
      #counter.show { opacity: 1; visibility: visible; }
      #counter .ticket-head {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        font-family: 'DotGothic16', monospace; font-size: 13px; font-weight: 700;
        color: #23445C; margin-bottom: 5px; border-bottom: 1px dashed rgba(35,68,92,.26); padding-bottom: 4px;
      }
      #counter .ticket-head small { font-family: 'DotGothic16', monospace; font-size: 10px; color: #638397; }
      #counter .ticket-progress {
        display: flex; align-items: center; gap: 4px; margin: 0;
      }
      #counter .ticket-progress span {
        width: 100%; height: 7px; background: #DDEBE8; box-shadow: inset 0 0 0 1px rgba(35,68,92,.12);
      }
      #counter .ticket-progress span.done { background: #FFE7A8; }
      #counter .ticket-progress span.current { background: #C9FFF0; box-shadow: inset 0 0 0 1px #8CB9B6; }
      #counter .counter-compact {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        margin-top: 5px;
      }
      #counter .counter-compact small {
        font-family: 'Press Start 2P', monospace; font-size: 7px; color: #638397;
      }
      #counter .compact-start,
      #counter .compact-finalize {
        position: relative; width: 22px; height: 22px; padding: 0; border: 0;
        background: transparent; box-shadow: none; cursor: pointer;
        app-region: no-drag; -webkit-app-region: no-drag;
      }
      #counter .compact-start::before {
        content: ''; position: absolute; left: 7px; top: 4px; width: 0; height: 0;
        border-top: 7px solid transparent; border-bottom: 7px solid transparent;
        border-left: 11px solid #D49A00;
        filter:
          drop-shadow(-1px 0 0 #FFF7C8)
          drop-shadow(1px 0 0 #FFF7C8)
          drop-shadow(0 1px 0 #FFF7C8);
      }
      #counter .compact-finalize::before {
        content: ''; position: absolute; left: 4px; top: 6px; width: 14px; height: 9px;
        border-left: 4px solid #D49A00; border-bottom: 4px solid #D49A00;
        transform: rotate(-45deg);
        filter:
          drop-shadow(-1px 0 0 #FFF7C8)
          drop-shadow(1px 0 0 #FFF7C8)
          drop-shadow(0 1px 0 #FFF7C8);
      }
      #counter .compact-start:hover,
      #counter .compact-finalize:hover {
        transform: scale(1.08);
      }
      #counter .ingredient {
        padding: 5px 0; border-bottom: 1px dashed rgba(35,68,92,.3); cursor: default;
        app-region: no-drag; -webkit-app-region: no-drag; position: relative;
        display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 5px;
      }
      #counter .ingredient.current {
        grid-template-columns: minmax(0, 1fr) auto auto; row-gap: 2px; padding: 7px 0 8px;
      }
      #counter .ingredient.current .task-step {
        grid-column: 1 / -1; font-size: 10px; color: #8A6D3B;
      }
      #counter .ingredient.current .ing-title {
        font-size: 13px; font-weight: 700;
      }
      #counter .ingredient.current .ing-meta {
        grid-column: 1 / 2;
      }
      #counter .ingredient.current .task-check {
        grid-column: 2; grid-row: 2 / 4; align-self: center;
      }
      #counter .ingredient:last-child { border-bottom: none; }
      #counter .task-check {
        width: 20px; height: 20px; border: 2px solid #8CB9B6; background: #F8FFFD;
        box-shadow: 1px 1px 0 rgba(35,68,92,.2); cursor: pointer;
      }
      #counter .task-check:hover { border-color: #D49A00; background: #FFF8D8; }
      #counter .ingredient.done .task-check {
        background: #FFE8A3;
        border-color: #D49A00;
      }
      #counter .ingredient.done .task-check::after {
        content: ''; display: block; width: 12px; height: 7px; margin: 3px 0 0 3px;
        border-left: 4px solid #D49A00; border-bottom: 4px solid #D49A00; transform: rotate(-45deg);
      }
      #counter .task-start {
        grid-row: 2 / 4; grid-column: 3; align-self: center;
        border: 0; background: transparent; color: #8A6D3B;
        font-family: 'Cinzel Decorative', 'ZCOOL XiaoWei', serif; font-size: 15px; font-weight: 700;
        text-shadow: 0 1px 0 rgba(255,255,255,.8);
        cursor: pointer; padding: 0 2px;
      }
      #counter .task-start:hover { color: #D49A00; transform: translateY(-1px); }
      #counter .task-start:disabled { color: #638397; cursor: default; transform: none; }
      #counter .ing-title { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #counter .ingredient.done .ing-title { text-decoration: line-through; opacity: .68; }
      #counter .ing-meta { font-size: 11px; color: #638397; }
      #counter .ticket-actions {
        display: flex; justify-content: center; gap: 8px; padding-top: 7px; flex-wrap: wrap;
      }
      #counter .ticket-actions button,
      #petConfirm {
        border: 0; background: transparent; box-shadow: none; color: #8A6D3B;
        font-family: 'Cinzel Decorative', 'ZCOOL XiaoWei', serif; font-size: 14px; font-weight: 700;
        text-shadow: 0 1px 0 rgba(255,255,255,.8), 0 0 10px rgba(255,243,196,.5);
        cursor: pointer;
      }
      #petConfirm {
        display: none; margin: 1px 0 4px; app-region: no-drag; -webkit-app-region: no-drag;
      }
      #stage.choosing-mode #petConfirm { display: block; }
      #stage:not(.choosing-mode) #petConfirm,
      #stage:not(.choosing-mode) .chooser-arrow {
        display: none;
      }
      #counter .ingredient.pouring {
        animation: pourIntoCup 0.55s ease-in forwards;
        pointer-events: none;
      }
      @keyframes pourIntoCup {
        0% { transform: translate(0, 0) scale(1); opacity: 1; }
        100% { transform: translate(52px, 78px) scale(0.2); opacity: 0; }
      }
      #workspace {
        display: flex; flex-direction: row; align-items: flex-end; justify-content: center;
        gap: 4px; margin-bottom: 1px; position: relative;
      }
      .chooser-arrow {
        width: 32px; height: 42px; border: 0; padding: 0; margin-bottom: 44px;
        background: transparent; box-shadow: none; opacity: 0; visibility: hidden;
        app-region: no-drag; -webkit-app-region: no-drag; cursor: pointer;
        position: relative; z-index: 9; flex: 0 0 32px; pointer-events: auto;
        filter: drop-shadow(2px 2px 0 #23445C);
      }
      #stage.choosing-mode .chooser-arrow { opacity: 1; visibility: visible; }
      .chooser-arrow::before {
        content: ''; display: block; width: 23px; height: 31px; margin: 6px auto; background: #8FE4DF;
        clip-path: polygon(
          100% 0, 62% 0, 0 50%,
          62% 100%, 100% 100%, 38% 50%
        );
      }
      #petNext::before { transform: scaleX(-1); }
      .chooser-arrow:hover::before { background: #C9FFF0; }
      #stage.choosing-mode .chooser-arrow::after {
        content: '';
        position: absolute;
        left: 13px;
        top: 16px;
        width: 10px;
        height: 9px;
        background: #C9FFF0;
        clip-path: polygon(100% 0, 42% 50%, 100% 100%, 74% 100%, 16% 50%, 74% 0);
      }
      #stage.choosing-mode #petNext::after { transform: scaleX(-1); }
      #magicFx {
        position: absolute; left: 50%; top: 50%; width: 136px; height: 116px;
        transform: translate(-50%, -58%); pointer-events: none; opacity: 0;
      }
      #magicFx.show { opacity: 1; }
      #magicFx .wand {
        position: absolute; width: 58px; height: 8px; left: 22px; top: 38px;
        background: #F1FFFC; border: 2px solid #23445C; box-shadow: 3px 3px 0 #23445C;
        transform-origin: 100% 50%; opacity: 0;
      }
      #magicFx .wand::after {
        content: ''; position: absolute; right: -10px; top: -8px; width: 10px; height: 10px;
        background: #7E8BE6;
        box-shadow: 0 -7px 0 -2px #7E8BE6, 0 7px 0 -2px #7E8BE6, -7px 0 0 -2px #7E8BE6, 7px 0 0 -2px #7E8BE6;
      }
      #magicFx .glass {
        position: absolute; bottom: 20px; width: 24px; height: 31px;
        border: 3px solid #23445C; border-top: 0; background: rgba(143,228,223,.32);
        box-shadow: 3px 3px 0 #23445C; opacity: 0;
      }
      #magicFx .glass::before {
        content: ''; position: absolute; left: 2px; right: 2px; bottom: 3px; height: 13px; background: #8FE4DF;
      }
      #magicFx .glass.left { left: 48px; transform: rotate(-12deg); }
      #magicFx .glass.right { right: 48px; transform: rotate(12deg); }
      #magicFx .spark {
        position: absolute; width: 7px; height: 7px; background: #7E8BE6; opacity: 0;
        box-shadow: 0 -6px 0 -2px #7E8BE6, 0 6px 0 -2px #7E8BE6, -6px 0 0 -2px #7E8BE6, 6px 0 0 -2px #7E8BE6;
      }
      #magicFx .spark.s1 { left: 72px; top: 36px; }
      #magicFx .spark.s2 { right: 54px; top: 54px; transform: scale(.8); }
      #magicFx .spark.s3 { left: 92px; bottom: 34px; transform: scale(.7); }
      #magicFx.toast .wand { animation: wandCast .72s steps(3) both; }
      #magicFx.toast .glass.left { animation: glassLeft .76s ease-out both; }
      #magicFx.toast .glass.right { animation: glassRight .76s ease-out both; }
      #magicFx.toast .spark { animation: sparklePop .82s ease-out both; }
      #magicFx.summon .wand { animation: wandCast .9s steps(4) both; }
      #magicFx.summon .spark { animation: sparklePop 1s ease-out both; }
      @keyframes wandCast {
        0% { opacity: 0; transform: translate(-18px, 18px) rotate(-35deg); }
        20% { opacity: 1; }
        75% { opacity: 1; transform: translate(34px, -18px) rotate(22deg); }
        100% { opacity: 0; transform: translate(44px, -24px) rotate(26deg); }
      }
      @keyframes glassLeft {
        0% { opacity: 0; transform: translate(-18px, 6px) rotate(-25deg); }
        45% { opacity: 1; transform: translate(0, 0) rotate(-12deg); }
        70% { opacity: 1; transform: translate(10px, -5px) rotate(10deg); }
        100% { opacity: 0; transform: translate(2px, 0) rotate(-8deg); }
      }
      @keyframes glassRight {
        0% { opacity: 0; transform: translate(18px, 6px) rotate(25deg); }
        45% { opacity: 1; transform: translate(0, 0) rotate(12deg); }
        70% { opacity: 1; transform: translate(-10px, -5px) rotate(-10deg); }
        100% { opacity: 0; transform: translate(-2px, 0) rotate(8deg); }
      }
      @keyframes sparklePop {
        0% { opacity: 0; transform: scale(.3) rotate(0deg); }
        35% { opacity: 1; }
        100% { opacity: 0; transform: scale(1.45) rotate(90deg); }
      }
      #sprite {
        image-rendering: pixelated; cursor: grab; transform-origin: 50% 80%;
        position: relative; width: 158px; height: 158px; display: flex; align-items: center; justify-content: center;
        app-region: no-drag; -webkit-app-region: no-drag;
      }
      #sprite.dragging,
      #plate.dragging { cursor: grabbing; }
      #stage.choosing-mode #sprite { cursor: pointer; }
      #stage.island-mode #sprite {
        width: 42px; height: 42px; flex: 0 0 42px;
      }
      #stage.island-mode #sprite img {
        width: 42px; height: 42px;
      }
      #stage.island-mode #sprite svg {
        width: 42px; height: 42px;
      }
      #sprite img {
        width: 158px; height: 158px; object-fit: contain; image-rendering: pixelated; display: block;
        -webkit-user-drag: none; user-select: none;
      }
      #stage[data-pet="ginger"] #workspace {
        margin-bottom: -4px;
      }
      #stage[data-pet="cilantro"] #sprite img {
        width: 178px;
        height: 178px;
      }
      #stage.island-mode[data-pet="cilantro"] #sprite img {
        width: 47px;
        height: 47px;
      }
      #cup {
        width: 34px; height: 46px; margin-bottom: 3px;
        border: 3px solid #23445C; border-top: none; border-radius: 0 0 9px 9px;
        background: rgba(248, 255, 253, 0.38); position: relative; overflow: hidden;
        opacity: 0; visibility: hidden; transition: opacity .2s;
        app-region: no-drag; -webkit-app-region: no-drag; cursor: pointer;
      }
      #cup.show { opacity: 1; visibility: visible; }
      #cup.pour-flash { animation: cupFlash 0.25s ease-out; }
      @keyframes cupFlash {
        0% { box-shadow: 0 0 0 #C9FFF0; }
        50% { box-shadow: 0 0 8px #C9FFF0; }
        100% { box-shadow: 0 0 0 #C9FFF0; }
      }
      #cup .layer {
        position: absolute; left: 0; right: 0; bottom: 0;
        font-size: 7px; color: #F8FFFD; text-align: center; line-height: 1.1;
        overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        border-top: 1px solid #23445C; text-shadow: 0 1px 0 #23445C;
        animation: layerFill 0.45s ease-out;
      }
      @keyframes layerFill {
        from { transform: translateY(-6px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      #plate { cursor: pointer; app-region: no-drag; -webkit-app-region: no-drag; }
      #plate {
        display: none;
        font-family: 'DotGothic16', monospace; font-size: 12px; color: #23445C;
        position: relative; overflow: hidden;
        background: #F1FFFC;
        border: 3px solid #23445C; box-shadow: 3px 3px 0 #23445C, 0 0 0 2px rgba(201,255,240,.72);
        padding: 5px 18px; margin-top: 4px; white-space: nowrap;
        text-shadow: 0 1px 0 rgba(255,255,255,.75);
      }
      #plate::before,
      #plate::after {
        content: ''; position: absolute; width: 9px; height: 9px; top: 50%; transform: translateY(-50%);
        background: #B996FF;
        clip-path: polygon(50% 0, 62% 36%, 100% 50%, 62% 64%, 50% 100%, 38% 64%, 0 50%, 38% 36%);
        filter: drop-shadow(1px 1px 0 #23445C);
      }
      #plate::before { left: 5px; }
      #plate::after { right: 5px; background: #C9FFF0; }
      #plate:hover {
        filter: brightness(1.04);
      }
      .bob { animation: none; }
      @keyframes bob { 0%,100% { transform: translateY(0); } }
      .shake { animation: shake .35s steps(2) infinite; transform-origin: 50% 80%; }
      @keyframes shake { 0% { transform: rotate(-8deg); } 50% { transform: rotate(8deg) translateY(-3px); } 100% { transform: rotate(-8deg); } }
      .focus { animation: focusBreathe 7.2s ease-in-out infinite; transform-origin: 50% 80%; }
      @keyframes focusBreathe {
        0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
        50% { transform: translateY(0) scale(1.004); filter: brightness(1.01); }
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="petControls">
        <button id="petMood" class="pet-tool tool-wand" aria-label="给桌宠施开心魔法" title="开心魔法"></button>
        <button id="petDock" class="pet-tool tool-clock" aria-label="进入像素计时器" title="像素计时器"></button>
      </div>
      <div id="bubble"></div>
      <button id="petConfirm" aria-label="确认召唤当前种种">确认召唤</button>
      <div id="islandTask" aria-live="polite"></div>
      <div id="timerChip"><span class="timer-mark" aria-hidden="true"></span><strong id="timerText">00:00</strong></div>
      <button id="islandComplete" aria-label="完成当前任务"></button>
      <div id="counter"></div>
      <div id="workspace">
        <div id="magicFx">
          <span class="wand"></span>
          <span class="glass left"></span>
          <span class="glass right"></span>
          <span class="spark s1"></span>
          <span class="spark s2"></span>
          <span class="spark s3"></span>
        </div>
        <button id="petPrev" class="chooser-arrow" aria-label="上一只种种"></button>
        <div id="sprite" class="bob"></div>
        <button id="petNext" class="chooser-arrow" aria-label="下一只种种"></button>
